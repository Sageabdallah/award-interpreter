<!-- @dsCard group="Components" viewport="700x340" name="Feedback — StepRow · Flag" subtitle="The processing audit sequence and inline annotation chips" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--font-body); padding: 26px; }
  .sect { margin-bottom: 22px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .steps { display: flex; flex-direction: column; gap: 4px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const NS = window.AxiWFMAwardInterpreterDesignSystem_c5602f || {};
    const { StepRow, Flag } = NS;
    const L = window.lucide || {};
    function Icon({ name, size = 16, strokeWidth = 2, color = 'currentColor', spin = false }) {
      const node = L[name];
      if (!node || !Array.isArray(node[2])) return null;
      return React.createElement('svg', { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: color, strokeWidth, strokeLinecap: 'round', strokeLinejoin: 'round', style: spin ? { animation: 'ax-spin 0.9s linear infinite' } : undefined },
        node[2].map((c, i) => React.createElement(c[0], { key: i, ...c[1] })));
    }
    const STEPS = [
      { label: 'Hashing the document set', detail: 'Computing the cache fingerprint for the uploaded rule documents' },
      { label: 'Parsing award records', detail: 'Extracting code, levels, rates, allowances and penalties' },
      { label: 'Reading employee agreements', detail: 'Mapping employees to award code, level, role and overrides' },
    ];

    function Demo() {
      const active = 1;
      return (
        <>
          <div className="sect">
            <div className="lbl">Step rows — done · active · pending</div>
            <div className="steps">
              {STEPS.map((s, i) => (
                <StepRow key={s.label} {...s} delay={0}
                  status={i < active ? 'done' : i === active ? 'active' : 'pending'}
                  doneIcon={<Icon name="Check" size={17} strokeWidth={2.4} />}
                  activeIcon={<Icon name="Loader2" size={18} strokeWidth={2.2} spin />} />
              ))}
            </div>
          </div>
          <div className="sect">
            <div className="lbl">Flags — note (ochre) + error (red)</div>
            <div className="row">
              <Flag icon={<Icon name="AlertTriangle" size={15} strokeWidth={1.8} />}>Over-award rate — agreement overrides the award base</Flag>
              <Flag danger icon={<Icon name="AlertTriangle" size={15} strokeWidth={1.8} />}>Night loading parsed as ×0.15 over 10:00–13:00 — shown as-is</Flag>
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
