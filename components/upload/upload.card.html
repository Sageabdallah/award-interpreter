<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--font-body); padding: 26px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const NS = window.AxiWFMAwardInterpreterDesignSystem_c5602f || {};
    const { UploadCard } = NS;
    const L = window.lucide || {};
    function Icon({ name, size = 16, strokeWidth = 1.6, color = 'currentColor' }) {
      const node = L[name];
      if (!node || !Array.isArray(node[2])) return null;
      return React.createElement('svg', { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: color, strokeWidth, strokeLinecap: 'round', strokeLinejoin: 'round' },
        node[2].map((c, i) => React.createElement(c[0], { key: i, ...c[1] })));
    }
    const up = <Icon name="UploadCloud" size={24} />, ck = <Icon name="Check" size={19} strokeWidth={2.2} />, rm = <Icon name="X" size={16} />;

    function Demo() {
      return (
        <div className="grid">
          <UploadCard index="03" headerIcon={<Icon name="FileText" size={22} />} title="Employee Agreement"
            subtitle="Profiles, roles, levels and overrides" accept=".pdf,.docx,.txt" formats="PDF · DOCX · TXT"
            uploadIcon={up} checkIcon={ck} removeIcon={rm} />
          <UploadCard index="04" headerIcon={<Icon name="FileSpreadsheet" size={22} />} title="Timesheet"
            subtitle="Shift entries for the pay period" formats="CSV · XLSX · XLS"
            file={{ name: 'timesheet-nov-fortnight.xlsx', size: 20140 }} checkIcon={ck} removeIcon={rm} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
