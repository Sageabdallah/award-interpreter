<!-- @dsCard group="Colors" viewport="700x196" name="Accent roles" subtitle="iSOFT red, green, deep crimson — each carries one fixed job" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-body); color: var(--ink); padding: 22px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .sw { border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; background: var(--card); }
  .chip { height: 58px; display: flex; align-items: flex-end; padding: 8px 11px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: rgba(245,241,234,0.85); }
  .meta { padding: 10px 12px; }
  .name { font-size: 13px; font-weight: 600; }
  .role { font-size: 11.5px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#E11B22"><span class="hex">#E11B22</span></div><div class="meta"><div class="name" style="color:#E11B22">Brand red</div><div class="role">The accent. Award codes, primary actions, selected/active.</div></div></div>
    <div class="sw"><div class="chip" style="background:#2F7D57"><span class="hex">#2F7D57</span></div><div class="meta"><div class="name" style="color:#2F7D57">Green</div><div class="role">Success · verified · matched · "ready".</div></div></div>
    <div class="sw"><div class="chip" style="background:#B0121F"><span class="hex">#B0121F</span></div><div class="meta"><div class="name" style="color:#B0121F">Deep crimson</div><div class="role">Validation errors · destructive · malformed data.</div></div></div>
  </div>
</body>
</html>
