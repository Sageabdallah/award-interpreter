<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="Not a strict 4/8 grid — editorial steps: 4·8·13·18·26·46" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper); color: var(--ink); padding: 24px; font-family: var(--font-body); }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { text-align: center; }
  .bar { background: var(--ochre); border-radius: 3px; width: 26px; }
  .lbl { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="lbl">4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="lbl">8</div></div>
    <div class="item"><div class="bar" style="height:13px"></div><div class="lbl">13</div></div>
    <div class="item"><div class="bar" style="height:18px"></div><div class="lbl">18</div></div>
    <div class="item"><div class="bar" style="height:26px"></div><div class="lbl">26</div></div>
    <div class="item"><div class="bar" style="height:34px"></div><div class="lbl">34</div></div>
    <div class="item"><div class="bar" style="height:46px"></div><div class="lbl">46</div></div>
  </div>
</body>
</html>
