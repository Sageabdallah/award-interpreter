<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-body); color: var(--ink); padding: 22px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .tile { flex: 1 1 150px; border-radius: var(--radius-md); padding: 12px 13px; font-size: 12px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; margin-top: 6px; opacity: 0.8; }
</style>
</head>
<body>
  <div class="row">
    <div class="tile" style="background:var(--ochre-tint);border:1px solid var(--ochre-ring);color:var(--ochre-strong)">Brand note / selected<div class="lbl">225,27,34 · 8%</div></div>
    <div class="tile" style="background:var(--sage-tint);border:1px solid var(--sage-ring);color:var(--sage)">Verified / worked<div class="lbl">47,125,87 · 12%</div></div>
    <div class="tile" style="background:var(--red-tint);border:1px solid var(--red-ring);color:var(--red)">Danger flag<div class="lbl">176,18,31 · 8%</div></div>
    <div class="tile" style="background:var(--hover-ink);border:1px solid var(--line);color:var(--ink)">Neutral hover<div class="lbl">20,22,28 · 5%</div></div>
  </div>
</body>
</html>
