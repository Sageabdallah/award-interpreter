<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper); color: var(--ink); padding: 24px; font-family: var(--font-body); }
  .d { font-family: var(--font-serif); font-weight: 500; letter-spacing: -0.015em; line-height: 1.02; }
  .tag { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); letter-spacing: 0.06em; }
  .line { display: flex; align-items: baseline; gap: 14px; margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="line"><span class="d" style="font-size:46px">Parse the award stack.</span></div>
  <div class="line"><span class="d" style="font-size:30px">148 employees calculated</span><span class="tag">30px · stat value</span></div>
  <div class="line"><span class="d" style="font-size:20px">Employee Agreement</span><span class="tag">20px · card title</span></div>
</body>
</html>
