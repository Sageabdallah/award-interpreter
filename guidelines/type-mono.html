<!-- @dsCard group="Type" viewport="700x196" name="Mono — JetBrains Mono" subtitle="The citation voice: award codes, rates, clause refs. Load-bearing." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper); color: var(--ink); padding: 24px; font-family: var(--font-body); }
  .m { font-family: var(--font-mono); }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }
  .r { display: flex; align-items: baseline; gap: 14px; margin-bottom: 11px; }
  .note { font-size: 12.5px; color: var(--muted); margin-top: 8px; max-width: 600px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="r"><span class="m" style="font-size:13.5px;color:var(--ochre);font-weight:600">MA000034</span><span class="tag">award code · always red</span></div>
  <div class="r"><span class="m" style="font-size:14.5px;font-weight:600">$1,350.00</span><span class="tag">rate / total</span></div>
  <div class="r"><span class="m" style="font-size:11px;color:var(--muted);border-bottom:1px dotted rgba(31,30,27,0.35)">cl. 15.2</span><span class="tag">clause ref · hoverable</span></div>
  <div class="note">Monospace on every code, rate and clause reference signals "this is a citation, not a vibe."</div>
</body>
</html>
