<!-- @dsCard group="Brand" viewport="700x170" name="Logo & wordmark" subtitle="The iSOFT ANZ red 'i' mark + wordmark, paired with the Axi·WFM lockup" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper); color: var(--ink); padding: 24px; font-family: var(--font-body); }
  .row { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
  .lockup { display: flex; align-items: center; gap: 12px; }
  .divider { width: 1px; height: 30px; background: var(--line); }
  .wm { font-family: var(--font-serif); font-weight: 600; font-size: 16.5px; line-height: 1; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; }
  .note { font-size: 12px; color: var(--muted); margin-top: 16px; max-width: 600px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="row">
    <div class="lockup">
      <img src="../assets/isoft-i.png" alt="iSOFT" style="height:36px;width:auto;display:block">
      <div class="divider"></div>
      <div>
        <div class="wm">Axi&thinsp;·&thinsp;WFM</div>
        <div class="eyebrow">Award Interpreter</div>
      </div>
    </div>
    <div class="card">
      <img src="../assets/isoft-wordmark.png" alt="iSOFT wordmark" style="height:22px;width:auto;display:block">
      <span style="font-size:12px;color:var(--muted)">an iSOFT ANZ product</span>
    </div>
  </div>
  <div class="note">Assets: <span class="mono" style="font-family:var(--font-mono)">assets/isoft-i.png</span> (the red "i" mark) and <span class="mono" style="font-family:var(--font-mono)">assets/isoft-wordmark.png</span> (the wordmark) — both supplied by iSOFT ANZ, white knocked out to transparent. Pair the mark with the "Axi · WFM" lockup in the masthead; use the wordmark for attribution.</div>
</body>
</html>
