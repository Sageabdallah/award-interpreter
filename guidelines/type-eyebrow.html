<!-- @dsCard group="Type" viewport="700x140" name="Eyebrow & table header" subtitle="Mono, uppercase, wide tracking — the small structural labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper); color: var(--ink); padding: 24px; font-family: var(--font-body); }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); }
  .th { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--muted); opacity: 0.7; }
  .r { display: flex; align-items: baseline; gap: 16px; margin-bottom: 14px; }
</style>
</head>
<body>
  <div class="r"><span class="eyebrow">01 — Upload</span><span class="tag">eyebrow · 11px / 0.22em</span></div>
  <div class="r"><span class="th">Total Calculated Pay</span><span class="tag">table header · 10.5px / 0.14em</span></div>
</body>
</html>
